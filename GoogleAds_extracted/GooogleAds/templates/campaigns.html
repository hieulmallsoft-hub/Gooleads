<!DOCTYPE html>
<html>
<head>
    <title>Top Campaigns </title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        h2 {
            margin-bottom: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .number {
            text-align: right;
        }
    </style>
</head>
<body>
<a href="/?customer_id={{ request.args.get('customer_id') }}&time=TODAY">Today</a> <a href="/?customer_id={{ request.args.get('customer_id') }}&time=YESTERDAY">Yesterday</a>

<h2>Top 50 Campaign {{ time_range }} - Total cost: {{ "{:,.0f}".format(total_cost) }} - ROAS: {{ "%.2f"|format(avg_roas) }}</h2>


<table>
    <thead>
        <tr>
             <th>Name</th>
            <th>COST</th>
             <th>ROAS</th>
        </tr>
    </thead>
    <tbody>
        {% for c in campaigns %}
        <tr>
             <td>{{ c.name }}</td>
            <td class="number">{{ "{:,.0f}".format(c.cost) }}</td>
            <td class="number">{{ "%.2f"|format(c.roas) }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
