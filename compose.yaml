services:
  postgres:
    image: postgres:16-alpine
    container_name: ggads-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ggads
      POSTGRES_USER: ggads
      POSTGRES_PASSWORD: ggads_local_password
    ports:
      - "5433:5432"
    volumes:
      - ggads_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggads -d ggads"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ggads_postgres_data:
